<div class="app-container">
  <main class="minimal-panel">
    <header>
      <h1>Voice Studio</h1>
      <div class="status-indicator" [ngClass]="{'listening': isListening}">
        <span class="pulse-dot"></span>
        <span class="status-text">{{ isListening ? 'Listening...' : 'Ready' }}</span>
      </div>
    </header>

    <div class="editor-area">
      <textarea 
        class="text-input" 
        [(ngModel)]="editableText" 
        placeholder="Start speaking or type here..."></textarea>
      <div class="interim-text" *ngIf="interimText">{{ interimText }}</div>
    </div>

    <div class="controls">
      <button class="btn" (click)="clearText()" [disabled]="!editableText && !interimText">Clear</button>
      
      <button class="record-btn" [ngClass]="{'is-recording': isListening}" (click)="toggleListening()">
        <svg *ngIf="!isListening" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
        <svg *ngIf="isListening" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="10" height="10" x="7" y="7" rx="2"></rect></svg>
      </button>

      <button class="btn" (click)="copyText()" [disabled]="!editableText && !interimText">Copy</button>
    </div>

    <div class="error-banner" *ngIf="error">{{ error }}</div>

    <!-- Visual Keyboard -->
    <div class="keyboard">
      <!-- Row 1 -->
      <div class="keyboard-row">
        <div class="key" [class.active]="isKeyActive('Backquote')">`</div>
        <div class="key" [class.active]="isKeyActive('Digit1')">1</div>
        <div class="key" [class.active]="isKeyActive('Digit2')">2</div>
        <div class="key" [class.active]="isKeyActive('Digit3')">3</div>
        <div class="key" [class.active]="isKeyActive('Digit4')">4</div>
        <div class="key" [class.active]="isKeyActive('Digit5')">5</div>
        <div class="key" [class.active]="isKeyActive('Digit6')">6</div>
        <div class="key" [class.active]="isKeyActive('Digit7')">7</div>
        <div class="key" [class.active]="isKeyActive('Digit8')">8</div>
        <div class="key" [class.active]="isKeyActive('Digit9')">9</div>
        <div class="key" [class.active]="isKeyActive('Digit0')">0</div>
        <div class="key" [class.active]="isKeyActive('Minus')">-</div>
        <div class="key" [class.active]="isKeyActive('Equal')">=</div>
        <div class="key key-wide" [class.active]="isKeyActive('Backspace')">Back</div>
      </div>
      <!-- Row 2 -->
      <div class="keyboard-row">
        <div class="key key-wide" [class.active]="isKeyActive('Tab')">Tab</div>
        <div class="key" [class.active]="isKeyActive('KeyQ')">Q</div>
        <div class="key" [class.active]="isKeyActive('KeyW')">W</div>
        <div class="key" [class.active]="isKeyActive('KeyE')">E</div>
        <div class="key" [class.active]="isKeyActive('KeyR')">R</div>
        <div class="key" [class.active]="isKeyActive('KeyT')">T</div>
        <div class="key" [class.active]="isKeyActive('KeyY')">Y</div>
        <div class="key" [class.active]="isKeyActive('KeyU')">U</div>
        <div class="key" [class.active]="isKeyActive('KeyI')">I</div>
        <div class="key" [class.active]="isKeyActive('KeyO')">O</div>
        <div class="key" [class.active]="isKeyActive('KeyP')">P</div>
        <div class="key" [class.active]="isKeyActive('BracketLeft')">[</div>
        <div class="key" [class.active]="isKeyActive('BracketRight')">]</div>
        <div class="key" [class.active]="isKeyActive('Backslash')">\</div>
      </div>
      <!-- Row 3 -->
      <div class="keyboard-row">
        <div class="key key-wider" [class.active]="isKeyActive('CapsLock')">Caps</div>
        <div class="key" [class.active]="isKeyActive('KeyA')">A</div>
        <div class="key" [class.active]="isKeyActive('KeyS')">S</div>
        <div class="key" [class.active]="isKeyActive('KeyD')">D</div>
        <div class="key" [class.active]="isKeyActive('KeyF')">F</div>
        <div class="key" [class.active]="isKeyActive('KeyG')">G</div>
        <div class="key" [class.active]="isKeyActive('KeyH')">H</div>
        <div class="key" [class.active]="isKeyActive('KeyJ')">J</div>
        <div class="key" [class.active]="isKeyActive('KeyK')">K</div>
        <div class="key" [class.active]="isKeyActive('KeyL')">L</div>
        <div class="key" [class.active]="isKeyActive('Semicolon')">;</div>
        <div class="key" [class.active]="isKeyActive('Quote')">'</div>
        <div class="key key-wider" [class.active]="isKeyActive('Enter')">Enter</div>
      </div>
      <!-- Row 4 -->
      <div class="keyboard-row">
        <div class="key key-widest" [class.active]="isKeyActive('ShiftLeft')">Shift</div>
        <div class="key" [class.active]="isKeyActive('KeyZ')">Z</div>
        <div class="key" [class.active]="isKeyActive('KeyX')">X</div>
        <div class="key" [class.active]="isKeyActive('KeyC')">C</div>
        <div class="key" [class.active]="isKeyActive('KeyV')">V</div>
        <div class="key" [class.active]="isKeyActive('KeyB')">B</div>
        <div class="key" [class.active]="isKeyActive('KeyN')">N</div>
        <div class="key" [class.active]="isKeyActive('KeyM')">M</div>
        <div class="key" [class.active]="isKeyActive('Comma')">,</div>
        <div class="key" [class.active]="isKeyActive('Period')">.</div>
        <div class="key" [class.active]="isKeyActive('Slash')">/</div>
        <div class="key key-widest" [class.active]="isKeyActive('ShiftRight')">Shift</div>
      </div>
      <!-- Row 5 -->
      <div class="keyboard-row">
        <div class="key key-wide" [class.active]="isKeyActive('ControlLeft')">Ctrl</div>
        <div class="key key-wide" [class.active]="isKeyActive('AltLeft')">Alt</div>
        <div class="key key-space" [class.active]="isKeyActive('Space')">Space</div>
        <div class="key key-wide" [class.active]="isKeyActive('AltRight')">Alt</div>
        <div class="key key-wide" [class.active]="isKeyActive('ControlRight')">Ctrl</div>
      </div>
    </div>
  </main>
</div>
